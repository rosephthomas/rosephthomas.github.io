<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MM to Inches</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 320px;
            text-align: center;
        }
        h2 { margin-bottom: 1rem; color: #333; }
        .input-group { margin-bottom: 1.5rem; }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        input[type="number"] {
            width: 100%;
            padding: 12px 40px 12px 12px;
            font-size: 1.2rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            text-align: center;
            outline: none;
        }
        input[type="number"]:focus { border-color: #007bff; }
        .input-unit {
            position: absolute;
            right: 12px;
            font-size: 1rem;
            color: #aaa;
            pointer-events: none;
        }
        .result-area { margin-top: 1.5rem; padding: 1rem; background: #f9f9f9; border-radius: 8px; }
        .main-text { font-size: 2rem; color: #007bff; font-weight: bold; line-height: 1.4; }
        .sub-text { display: block; margin-top: 5px; font-size: 0.85rem; color: #666; }
    </style>
</head>
<body>
<div class="card">
    <h2>MM to Inches</h2>
    <div class="input-group">
        <div class="input-wrapper">
            <input type="number" id="mmInput" placeholder="e.g. 12.7" oninput="convert()">
            <span class="input-unit">mm</span>
        </div>
    </div>
    <div class="result-area">
        <span class="main-text" id="output">-</span>
        <span class="sub-text" id="decimal">0.0 in</span>
    </div>
</div>

<script>
    function gcd(a, b) {
        return b ? gcd(b, a % b) : a;
    }

    function convert() {
        const val = parseFloat(document.getElementById('mmInput').value);

        if (!val || isNaN(val)) {
            document.getElementById('output').innerText = "-";
            document.getElementById('decimal').innerText = "0.0 in";
            return;
        }

        const inches = val / 25.4;
        const whole = Math.floor(inches);
        const remainder = inches - whole;
        const decimalEl = document.getElementById('decimal');
        const outputEl = document.getElementById('output');

        decimalEl.innerText = inches.toFixed(3) + " in";

        if (remainder < 0.001) {
            outputEl.innerText = whole + " in";
            return;
        }

        // Round to nearest 32nd, then reduce
        let num = Math.round(remainder * 32);
        let den = 32;

        // Handle rounding up to next whole inch
        if (num === den) {
            outputEl.innerText = (whole + 1) + " in";
            return;
        }

        const d = gcd(num, den);
        num /= d;
        den /= d;

        outputEl.innerText = whole > 0 ? `${whole}-${num}/${den}` : `${num}/${den}`;
    }

    document.getElementById('mmInput').addEventListener('paste', () => {
        setTimeout(convert, 50);
    });
</script>
</body>
</html>
